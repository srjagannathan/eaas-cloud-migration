version: "3.9"

# Local cloud-equivalent stack for Contoso Financial
# MinIO → S3, Postgres → RDS, Redis → ElastiCache
# Same topology as AWS target; swap env vars to deploy to cloud.

services:
  # ── Web App (ECS Fargate in cloud) ──────────────────────────────────────
  web:
    build: ./web-app
    image: contoso-web:local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://contoso:contoso@postgres:5432/contoso
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: contoso-reports
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Batch Job (AWS Batch in cloud) ─────────────────────────────────────
  batch:
    build: ./batch
    image: contoso-batch:local
    environment:
      DATABASE_URL: postgresql://contoso:contoso@postgres:5432/contoso
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: contoso-reports
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - batch  # run manually: docker compose --profile batch run batch

  # ── Postgres (RDS Postgres 15 in cloud) ────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: contoso
      POSTGRES_PASSWORD: contoso
      POSTGRES_DB: contoso
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./reporting-db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contoso -d contoso"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (ElastiCache Redis 7 in cloud) ───────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3 in cloud) ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket setup (runs once, creates contoso-reports bucket) ─────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/contoso-reports &&
      mc anonymous set none local/contoso-reports &&
      echo 'MinIO bucket ready'
      "

volumes:
  postgres_data:
  minio_data:
